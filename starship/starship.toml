# Starship prompt configuration — Tokyo Night theme
# https://starship.rs/config/

add_newline = false
format = "$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$cmd_duration$character"

# Timeout for command execution
command_timeout = 500

[character]
success_symbol = "[❯](bold blue)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " 󰌾"
read_only_style = "red"

[git_branch]
format = "on [$symbol$branch]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = '\$${count}'
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[username]
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_only = true
format = "at [$hostname](bold blue) "
disabled = false

# Language-specific modules (only shown when project files detected)
[nodejs]
format = "[$symbol$version](bold green) "
symbol = " "

[python]
format = "[$symbol$version( \\($virtualenv\\))](bold yellow) "
symbol = " "

[rust]
format = "[$symbol$version](bold red) "
symbol = " "

[golang]
format = "[$symbol$version](bold cyan) "
symbol = " "

# Execution time
[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "
