- defaults:
    link:
      relink: true
      create: true

- clean: ['~']

- link:
    ~/.editorconfig: editorconfig.ini
    ~/.gitconfig: git/gitconfig
    ~/.vimrc.shared: vim/vimrc.shared.vim
    ~/.config/nvim/init.vim: nvim/init.vim
    ~/.config/starship.toml: starship/starship.toml
    ~/.zshrc.shared: zsh/zshrc.shared.zsh

- create:
    - ~/.config/nvim

- shell:
    - description: Creating local config files
      command: |
        # Create machine-specific override files (not tracked in dotfiles)
        touch ~/.config/nvim/local.vim  # Neovim-specific local settings
        touch ~/.gitconfig.local        # Git local settings (proxy, credentials, etc)
        touch ~/.gitconfig.user         # Git user identity (generated by setup-git-user.sh)
      stdout: true
      stderr: true
    - description: Setting up shell config stubs
      command: ./scripts/setup-shell-configs.sh
      stdin: true
      stdout: true
      stderr: true
    - description: Installing prerequisites
      command: ./scripts/install-prerequisites.sh
      stdout: true
      stderr: true
    - description: Installing tools
      command: ./scripts/install-tools.sh
      stdout: true
      stderr: true
    - description: Setting up ZSH
      command: ./scripts/install-zsh.sh
      stdout: true
      stderr: true
    - description: Setting up Git user
      command: ./scripts/setup-git-user.sh
      stdin: true
      stdout: true
      stderr: true
    - description: Setting up Git pre-commit hook
      command: ./scripts/setup-git-hook.sh
      stdout: true
      stderr: true
    - description: Installing development environments (nvm, pyenv, rustup)
      command: ./scripts/install-dev-environments.sh
      stdin: true
      stdout: true
      stderr: true
