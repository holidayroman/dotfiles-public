# tmux configuration — Tokyo Night theme

# --- Prefix --------------------------------------------------------------
# Ctrl-Space has no conflicts with vim (Ctrl-a = increment) or readline
# (Ctrl-a = beginning of line), unlike the common screen-style Ctrl-a.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Terminal & colors ---------------------------------------------------
# RGB true-color for known modern terms; Ms (OSC 52 clipboard) for any *256col*
# outer terminal. One `set -g` so reloads replace the whole list instead of
# accumulating duplicates.
set -g default-terminal "tmux-256color"
set -g terminal-overrides "xterm-256color:RGB,xterm-kitty:RGB,alacritty:RGB,*256col*:Ms=\\E]52;c;%p2%s\\7"

# --- Clipboard -----------------------------------------------------------
# OSC 52: tmux's selection syncs to the host's clipboard automatically,
# including over SSH. Modern terminals (Warp, iTerm2, kitty, alacritty,
# WezTerm) all support it — some require an explicit "allow apps to write
# clipboard" setting on the terminal side.
set -g set-clipboard on

# --- General behavior ----------------------------------------------------
# Mouse on so the wheel scrolls per-pane (enters copy-mode automatically).
# For reliable copy-out if OSC 52 isn't accepted by the outer terminal,
# hold Option (or Shift) while click-dragging to bypass tmux entirely and
# use the outer terminal's native selection + Cmd+C.
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10          # avoid lag in neovim
set -g focus-events on          # let neovim detect focus changes
setw -g mode-keys vi

# --- Key bindings --------------------------------------------------------
# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded."

# Splits open in the current pane's cwd; | and - are easier than " and %
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# vi-style copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Mouse drag-end: copy without canceling the selection so the highlight stays
# visible after release. Locally on macOS, pipe straight to pbcopy (more
# reliable than OSC 52 for huge selections); over SSH, set-clipboard handles
# it via OSC 52 with no extra binding needed.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear 'pbcopy'" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear"

# Smoother scroll wheel in copy-mode — 3 lines per tick instead of 1.
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down

# Cheat sheet popup — prefix ? (also keeps h); press q to close.
# Overrides default ? = list-keys; full list still reachable via :list-keys.
bind ? display-popup -E -w 75% -h 80% "bash ~/.dotfiles/tmux/cheatsheet.sh | less -R"
bind h display-popup -E -w 75% -h 80% "bash ~/.dotfiles/tmux/cheatsheet.sh | less -R"

# --- Tokyo Night palette -------------------------------------------------
# bg=#24283b fg=#c0caf5 blue=#7aa2f7 cyan=#7dcfff purple=#bb9af7
# green=#9ece6a yellow=#e0af68 red=#f7768e comment=#565f89

set -g status-position top
set -g status-style "bg=#24283b,fg=#c0caf5"
# Powerline separators (require a Nerd Font):   hard,   soft
set -g status-left  "#[fg=#1a1b26,bg=#7aa2f7,bold]   #S #[fg=#7aa2f7,bg=#24283b,nobold] "
set -g status-right "#[fg=#bb9af7,bg=#24283b]#[fg=#1a1b26,bg=#bb9af7]   #(whoami)@#h #[fg=#7aa2f7,bg=#bb9af7]#[fg=#1a1b26,bg=#7aa2f7,bold]  %H:%M "
set -g status-left-length 40
set -g status-right-length 60

setw -g window-status-format         "#[fg=#565f89,bg=#24283b]   #I  #W  "
setw -g window-status-current-format "#[fg=#24283b,bg=#bb9af7]#[fg=#1a1b26,bg=#bb9af7,bold]  #I  #W #[fg=#bb9af7,bg=#24283b,nobold]"
setw -g window-status-current-style  "bold"
setw -g window-status-separator      ""

set -g pane-border-style        "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style            "bg=#292e42,fg=#c0caf5"

# --- Plugins (TPM) -------------------------------------------------------
# Auto-cloned by scripts/install-tmux-plugins.sh during ./install. After
# editing this list, reload the config and press `prefix + I` to install
# anything new.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'laktak/extrakto'          # prefix + Tab: fzf over visible pane text

# Initialize TPM — must be the very last line.
run '~/.tmux/plugins/tpm/tpm'
