# tmux configuration — Tokyo Night theme

# --- Prefix --------------------------------------------------------------
# Ctrl-Space has no conflicts with vim (Ctrl-a = increment) or readline
# (Ctrl-a = beginning of line), unlike the common screen-style Ctrl-a.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Terminal & colors ---------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-kitty:RGB,alacritty:RGB"

# --- General behavior ----------------------------------------------------
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10          # avoid lag in neovim
set -g focus-events on          # let neovim detect focus changes
setw -g mode-keys vi

# --- Key bindings --------------------------------------------------------
# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded."

# Splits open in the current pane's cwd; | and - are easier than " and %
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# vi-style copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Cheat sheet popup — prefix h
bind h display-popup -E -w 70% -h 75% "less ~/.dotfiles/tmux/cheatsheet.txt"

# --- Tokyo Night palette -------------------------------------------------
# bg=#24283b fg=#c0caf5 blue=#7aa2f7 cyan=#7dcfff purple=#bb9af7
# green=#9ece6a yellow=#e0af68 red=#f7768e comment=#565f89

set -g status-position top
set -g status-style "bg=#24283b,fg=#c0caf5"
set -g status-left  "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#24283b]"
set -g status-right "#[fg=#565f89]#(whoami)@#h #[fg=#7aa2f7]%H:%M "
set -g status-left-length 40
set -g status-right-length 60

setw -g window-status-format         "  #I:#W  "
setw -g window-status-current-format "#[fg=#24283b,bg=#bb9af7] #I:#W #[fg=#bb9af7,bg=#24283b]"
setw -g window-status-current-style  "bold"

set -g pane-border-style        "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style            "bg=#292e42,fg=#c0caf5"
